<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Offers - Anura Furnitures</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .offer-hero {
      background: linear-gradient(135deg, #5D4037, #C8A951);
      color: white;
      padding: 80px 40px;
      text-align: center;
      margin-bottom: 40px;
    }
    .offer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 30px;
    }
    .offer-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: all 0.3s;
    }
    .offer-card:hover {
      transform: translateY(-10px);
    }
    .offer-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #e74c3c;
      color: white;
      padding: 6px 18px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .product-offer-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 0 30px;
    }
    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: all 0.3s;
    }
    .product-card:hover {
      transform: translateY(-8px);
    }
    .product-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .discount-price {
      color: #e74c3c;
      font-weight: bold;
      text-decoration: line-through;
      font-size: 0.95rem;
    }
    .offer-price {
      color: #27ae60;
      font-size: 1.4rem;
      font-weight: 700;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<div class="top-navbar">
  <div class="logo">Anura Furnitures</div>
  <div class="navbar-right" id="auth-section"></div>
</div>

<div class="second-navbar">
  <a href="/shop.html">All Products</a>
  <a href="/offers.html" style="color:#C8A951; font-weight:700;">🎟️ Special Offers</a>
  <a href="/shop.html?new=true">New Arrivals</a>
</div>

<div class="offer-hero">
  <h1 style="font-size:3.2rem; margin:0;">Special Offers</h1>
  <p style="font-size:1.4rem; margin:15px 0 0;">Limited time deals on premium furniture</p>
</div>

<div id="offersContainer" style="max-width:1400px; margin:0 auto; padding:20px;">
  <!-- Populated dynamically by JS -->
</div>

<script src="/js/main.js"></script>
<script src="/js/i18n.js"></script>
<script>
  async function loadOffersPage() {
    const container = document.getElementById('offersContainer');
    container.innerHTML = '<div class="loading" style="text-align:center;padding:80px;font-size:1.3rem;">Loading special offers...</div>';

    try {
      const res = await fetch('/api/offers');
      if (!res.ok) throw new Error();
      const offers = await res.json();

      if (offers.length === 0) {
        container.innerHTML = '<p style="text-align:center;font-size:1.4rem;padding:80px;">No active offers at the moment.<br>Check back soon!</p>';
        return;
      }

      let html = '';
      for (const offer of offers) {
        // Fetch products assigned to this offer
        const prodRes = await fetch(`/api/offers/products/${offer.offerId}`);
        const products = await prodRes.json();

        html += `
                <div style="margin-bottom:60px;">
                    <div style="background:#5D4037;color:white;padding:20px 30px;border-radius:12px 12px 0 0;">
                        <h2>${offer.title} <span style="background:#e74c3c;padding:4px 12px;border-radius:20px;font-size:1rem;">${offer.discountPercentage}% OFF</span></h2>
                        <p>${offer.description || 'Limited time special offer'}</p>
                        <small>Valid until: ${offer.endDate || 'Soon'}</small>
                    </div>

                    <div class="product-offer-grid">
            `;

        if (products.length === 0) {
          html += `<p style="grid-column:1/-1;text-align:center;padding:40px;color:#777;">No products assigned to this offer yet.</p>`;
        } else {
          products.forEach(p => {
            const originalPrice = Number(p.price);
            const discountedPrice = (originalPrice * (1 - (offer.discountPercentage / 100))).toFixed(2);

            html += `
                        <div class="product-card" onclick="window.location.href='/product-details.html?id=${p.productId}'">
                            <img src="${p.imageUrls && p.imageUrls[0] ? p.imageUrls[0] : '/images/placeholder.jpg'}" alt="${p.name}">
                            <div style="padding:16px;">
                                <h4>${p.name}</h4>
                                <p class="discount-price">Rs. ${originalPrice.toLocaleString('si-LK')}</p>
                                <p class="offer-price">Rs. ${Number(discountedPrice).toLocaleString('si-LK')}</p>
                            </div>
                        </div>
                    `;
          });
        }

        html += `</div></div>`;
      }

      container.innerHTML = html;
    } catch (e) {
      console.error(e);
      container.innerHTML = '<p style="color:red;text-align:center;padding:80px;">Failed to load offers. Please try again later.</p>';
    }
  }

  window.onload = async () => {
    await applyLanguage();
    await checkAuth();
    await loadOffersPage();
  };
</script>
</body>
</html>
